# Performance test configuration
spring:
  kafka:
    producer:
      # Optimize for performance
      buffer-memory: 33554432 # 32MB
      batch-size: 16384 # 16KB
      linger-ms: 5
      compression-type: snappy
      max-in-flight-requests-per-connection: 5
      enable-idempotence: true
    consumer:
      # Optimize for high throughput
      fetch-min-bytes: 524288 # 512KB
      fetch-max-wait-ms: 500
      max-poll-records: 500
      max-partition-fetch-bytes: 1048576 # 1MB

    streams:
      # Streams performance tuning
      properties:
        num.stream.threads: 4
        commit.interval.ms: 100
        cache.max.bytes.buffering: 10485760 # 10MB

# Test thresholds (for assertions)
performance:
  thresholds:
    min-throughput: 100 # messages per second
    max-p95-latency-ms: 500
    max-error-rate: 0.01 # 1%
    min-success-rate: 0.95 # 95%