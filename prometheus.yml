global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'kafka-wrapper-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      # Note: 'host.docker.internal' allows the container to talk to your local Spring Boot app on port 8080
      - targets: ['host.docker.internal:8080']
